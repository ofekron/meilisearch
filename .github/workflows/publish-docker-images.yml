name: Publish images to Docker Hub

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        platform: [amd64]
        edition: [community]
        include:
          - platform: amd64
            runner: ubuntu-24.04
          - edition: community
            registry: getmeili/meilisearch
            feature-flag: ""

    permissions: {}
    steps:
      - uses: jfrog-fastci/fastci@v0

      - uses: actions/checkout@v5

      - name: Prepare
        run: |
          platform=linux/${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/${{ matrix.platform }}
          install: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.registry }}
          flavor: latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=nightly,enable=${{ github.event_name != 'push' }}

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        id: build-and-push
        with:
          platforms: linux/${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          push: false
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            COMMIT_DATE=${{ steps.build-metadata.outputs.date }}
            GIT_TAG=${{ github.ref_name }}
            EXTRA_ARGS=${{ matrix.feature-flag }}

  merge:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        edition: [community]
        include:
          - edition: community
            registry: getmeili/meilisearch
    needs:
      - build

    permissions: {}

    steps:
      - uses: jfrog-fastci/fastci@v0

      - uses: actions/checkout@v5

      - name: Define if stable and latest release
        id: check-tag-format
        run: |
          echo "stable=false" >> $GITHUB_OUTPUT
          echo "latest=false" >> $GITHUB_OUTPUT

      - name: Build summary
        run: echo "Build-only run complete for ${{ matrix.edition }} edition"
